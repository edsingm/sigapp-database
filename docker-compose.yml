networks:
  database_sigapp:
    name: database_sigapp
    driver: bridge

services:
  database:
    build:
      context: .docker
      dockerfile: Dockerfile
    image: sigapp-database:1.0
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_DB: sigapp
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18: o cluster fica em /var/lib/postgresql/18/docker (PGDATA versionado).
      # Montar o volume na raiz /var/lib/postgresql preserva o cluster existente em ./data/18/docker.
      - ./data:/var/lib/postgresql
    networks:
      - database_sigapp
